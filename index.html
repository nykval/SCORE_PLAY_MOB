<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#E7EDFC">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>SCORE PLAY Mobile</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon-s.svg">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css?v=20260623-product-pass1">
</head>
<body>
  <div id="app" class="app-shell">
    <section id="login-screen" class="login-screen" aria-label="Вход SCORE PLAY">
      <div class="login-brand" aria-hidden="true">SCORE</div>
      <div class="login-card">
        <p class="login-kicker">mobile web</p>
        <h1>Вход в SCORE PLAY</h1>
        <p>Используйте тестовый доступ для мобильной версии в Telegram.</p>
        <form id="login-form" class="login-form" autocomplete="off">
          <label>Логин
            <input id="login-input" type="text" value="SCORE" required>
          </label>
          <label>Пароль
            <input id="password-input" type="password" value="SCORE123" required>
          </label>
          <p id="login-error" class="login-error" aria-live="polite"></p>
          <button class="primary-pill" type="submit">Войти</button>
        </form>
      </div>
    </section>

    <main id="mobile-app" class="mobile-app" hidden>
      <header class="app-header">
        <button class="location-button" type="button" aria-label="Город">
          <img src="./icons/Местоположение%20.png" alt="" aria-hidden="true">
          <strong id="screen-location">Москва</strong>
        </button>
        <div class="header-actions">
          <button id="notifications-shortcut" class="icon-shortcut" type="button" data-action="open-notifications" aria-label="Уведомления">
            <img src="./icons/уведомления.png" alt="" aria-hidden="true">
            <i></i>
          </button>
          <button id="profile-shortcut" class="avatar-shortcut" type="button" aria-label="Профиль">
            <img src="./icons/Профиль.png" alt="">
          </button>
        </div>
      </header>

      <section id="screen-home" class="app-screen is-active" data-screen="home" aria-label="Главная"></section>
      <section id="screen-venues" class="app-screen" data-screen="venues" aria-label="Площадки"></section>
      <section id="screen-games" class="app-screen" data-screen="games" aria-label="Игры"></section>
      <section id="screen-favorites" class="app-screen" data-screen="favorites" aria-label="Избранное"></section>
      <section id="screen-team" class="app-screen" data-screen="team" aria-label="Команда"></section>
      <section id="screen-profile" class="app-screen" data-screen="profile" aria-label="Профиль"></section>

      <nav class="bottom-nav" aria-label="Основная навигация">
        <button class="is-active" type="button" data-nav="home" aria-label="Главная"><span aria-hidden="true"><img src="./icons/Главная.png" alt=""></span><strong>Главная</strong></button>
        <button type="button" data-nav="venues" aria-label="Площадки"><span aria-hidden="true"><img src="./icons/Площадки.png" alt=""></span><strong>Площадки</strong></button>
        <button type="button" data-nav="games" aria-label="Игры"><span aria-hidden="true"><img src="./icons/Игры.png" alt=""></span><strong>Игры</strong></button>
        <button type="button" data-nav="favorites" aria-label="Избранное"><span aria-hidden="true"><img src="./icons/Избранное.png" alt=""></span><strong>Избранное</strong></button>
      </nav>
    </main>

    <div id="sheet" class="sheet" hidden aria-hidden="true">
      <button class="sheet-backdrop" type="button" data-close-sheet aria-label="Закрыть"></button>
      <section class="sheet-panel" role="dialog" aria-modal="true">
        <div class="sheet-handle" aria-hidden="true"></div>
        <div id="sheet-content" class="sheet-content"></div>
      </section>
    </div>

    <div id="toast" class="toast" hidden></div>
  </div>

  <script src="./app.classic.js?v=20260623-product-pass1"></script>
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      var form = document.querySelector('#login-form');
      if (!form || form.dataset.fallbackBound === 'true') return;
      form.dataset.fallbackBound = 'true';
      form.addEventListener('submit', function (event) {
        var login = document.querySelector('#login-input');
        var password = document.querySelector('#password-input');
        var error = document.querySelector('#login-error');
        var app = document.querySelector('#mobile-app');
        var loginScreen = document.querySelector('#login-screen');
        var home = document.querySelector('#screen-home');
        var title = document.querySelector('#screen-title');
        if (!login || !password || !app || !loginScreen) return;
        if (String(login.value).trim().toUpperCase() === 'SCORE' && String(password.value).trim() === 'SCORE123') {
          event.preventDefault();
          loginScreen.hidden = true;
          app.hidden = false;
          try {
            var saved = JSON.parse(localStorage.getItem('scoreplay_mob_state') || '{}');
            saved.authorized = true;
            saved.activeScreen = 'home';
            localStorage.setItem('scoreplay_mob_state', JSON.stringify(saved));
          } catch (_) {
            localStorage.setItem('scoreplay_mob_state', JSON.stringify({ authorized: true, activeScreen: 'home' }));
          }
          if (title) title.textContent = 'План';
          if (home && !home.innerHTML.trim()) {
            home.innerHTML = '<div class="screen-stack"><article class="hero-card"><div class="hero-copy"><h2>Двигаемся сегодня</h2><p>Играть чаще · Любитель · Москва</p></div><div class="hero-goal"><span>Цель дня</span><strong>10 000</strong><div class="progress-block"><div class="progress-meta"><span>Прогресс</span><strong>6800 / 10000</strong></div><div class="progress-rail"><span style="width:68%"></span></div></div></div></article><section class="section-card"><div class="section-header"><h2>Приложение загружено</h2></div><p>Если основной интерфейс не появился после перезагрузки, сообщите об этом.</p></section></div>';
          }
          return;
        }
        if (error) error.textContent = 'Неверный логин или пароль';
      });
    });
  </script>
</body>
</html>
